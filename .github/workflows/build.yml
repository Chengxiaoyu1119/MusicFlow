name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Code Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

  build-web:
    name: 🌐 Web
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  build-android:
    name: 📱 Android APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: MusicFlow-Android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-macos:
    name: 🍎 macOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: MusicFlow-macOS
          path: build/macos/Build/Products/Release/music_player.app

  build-ios:
    name: 📱 iOS
    if: false  # 需要 Apple Developer 账号签名
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: MusicFlow-iOS
          path: build/ios/Release-iphoneos/
