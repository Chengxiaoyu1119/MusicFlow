name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Code Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

  build-web:
    name: 🌐 Web
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  build-android:
    name: 📱 Android APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: MusicFlow-Android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: 🪟 Windows
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: MusicFlow-Windows
          path: build/windows/runner/Release/

  build-ios:
    name: 📱 iOS IPA
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Install certificate
        if: ${{ secrets.IOS_P12_BASE64 != '' }}
        run: |
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 --decode > /tmp/cert.p12
          security create-keychain -p temp123 /tmp/build.keychain
          security unlock-keychain -p temp123 /tmp/build.keychain
          security import /tmp/cert.p12 -k /tmp/build.keychain -P "${{ secrets.IOS_P12_PASSWORD }}" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp123 /tmp/build.keychain
          security list-keychain -s /tmp/build.keychain
      - name: Install provisioning profile
        if: ${{ secrets.IOS_MOBILE_PROVISION != '' }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_MOBILE_PROVISION }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
      - run: flutter build ipa --release --export-options-plist=ios/exportOptions.plist
      - uses: actions/upload-artifact@v4
        with:
          name: MusicFlow-iOS
          path: build/ios/ipa/music_player.ipa

  build-macos:
    name: 🍎 macOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: MusicFlow-macOS
          path: build/macos/Build/Products/Release/music_player.app
