name: Build & Analyze

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build for web
        run: flutter build web --release

      - name: Upload web artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build for macOS
        run: flutter build macos --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: melodyflow-macos
          path: build/macos/Build/Products/Release/music_player.app

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build for Android
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: melodyflow-android
          path: build/app/outputs/flutter-apk/app-release.apk
